apiVersion: apps/v1
kind: Deployment
metadata:
  name: chioma-backend
  namespace: production
  labels:
    app: chioma-backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chioma-backend
  template:
    metadata:
      labels:
        app: chioma-backend
        version: v1
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      # Pod disruption budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - chioma-backend
                topologyKey: kubernetes.io/hostname

      # Service account for RBAC
      serviceAccountName: chioma-backend

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Init containers for pre-flight checks
      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ${DB_HOST} ${DB_PORT}; do
                echo "Waiting for database..."
                sleep 2
              done
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: db_host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: db_port

        - name: run-migrations
          image: chioma-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ "$RUN_MIGRATIONS_ON_START" = "true" ]; then
                npm run migration:run:prod
              fi
          env:
            - name: RUN_MIGRATIONS_ON_START
              value: 'true'
            - name: NODE_ENV
              value: 'production'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: database_url
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'

      # Main containers
      containers:
        - name: backend
          image: chioma-backend:latest
          imagePullPolicy: IfNotPresent

          # Port configuration
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 3000
              protocol: TCP

          # Environment variables
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
            - name: GRACEFUL_SHUTDOWN_TIMEOUT
              value: '30000'
            - name: OTEL_ENABLED
              value: 'true'
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'http://jaeger-collector:4317'

            # Database configuration
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: database_url
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: db_host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: db_port
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: db_username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: db_password
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: db_name

            # Redis configuration
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: redis_url

            # JWT configuration
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: jwt_secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: jwt_refresh_secret

            # Stellar configuration
            - name: STELLAR_NETWORK
              value: 'mainnet'
            - name: STELLAR_HORIZON_URL
              value: 'https://horizon.stellar.org'
            - name: SOROBAN_RPC_URL
              value: 'https://soroban-mainnet.stellar.org'
            - name: STELLAR_ADMIN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: stellar_admin_secret_key

            # Sentry configuration
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: sentry_dsn
            - name: SENTRY_ENVIRONMENT
              value: 'production'

            # AWS S3 configuration
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chioma-backend-secrets
                  key: aws_secret_access_key
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: aws_region
            - name: AWS_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: chioma-backend-config
                  key: aws_s3_bucket

          # Resource requests and limits
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'

          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - remove from load balancer if not ready
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe - give app time to start
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 15 && kill -TERM 1

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 45

      # DNS policy
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always
