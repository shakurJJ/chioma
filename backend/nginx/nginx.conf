# ==================== UPSTREAM CONFIGURATION ====================
# Load balancing upstream with health checks and auto-scaling support
upstream backend_pool {
    # Least connections load balancing strategy for better distribution
    least_conn;

    # Primary backend instances
    server backend-1:3000 weight=1 max_fails=3 fail_timeout=30s;
    server backend-2:3000 weight=1 max_fails=3 fail_timeout=30s backup;
    server backend-3:3000 weight=1 max_fails=3 fail_timeout=30s backup;

    # Connection pooling
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=2r/s;

# ==================== HTTP REDIRECT ====================
server {
    listen 80;
    server_name api.chioma.app;

    # Certbot ACME challenge (must be served over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ==================== HTTPS SERVER ====================
server {
    listen 443 ssl http2;
    server_name api.chioma.app;

    # ==================== SSL/TLS CONFIGURATION ====================
    ssl_certificate /etc/ssl/certs/chioma.crt;
    ssl_certificate_key /etc/ssl/private/chioma.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ==================== SECURITY HEADERS ====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==================== LOGGING ====================
    access_log /var/log/nginx/chioma-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/chioma-error.log warn;

    # ==================== GZIP COMPRESSION ====================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    gzip_min_length 1000;

    # ==================== BUFFERING CONFIGURATION ====================
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    proxy_max_temp_file_size 2048m;
    proxy_temp_file_write_size 32k;

    # ==================== TIMEOUTS ====================
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # ==================== REQUEST SIZE LIMITS ====================
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ==================== MAIN API ENDPOINT ====================
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy configuration
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;

        # Connection headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Client information
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_pragma $http_authorization;

        # Connection pooling
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ==================== HEALTH CHECK ENDPOINT ====================
    location /health {
        access_log off;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /health/detailed {
        access_log off;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ==================== METRICS ENDPOINT (RESTRICTED) ====================
    location /metrics {
        # Restrict to internal networks only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        access_log off;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ==================== AUTHENTICATION ENDPOINTS (STRICTER RATE LIMIT) ====================
    location ~ ^/api/auth/(login|register|refresh|mfa) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== PAYMENT ENDPOINTS (STRICT RATE LIMIT) ====================
    location ~ ^/api/payments/ {
        limit_req zone=strict_limit burst=3 nodelay;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== STATIC CONTENT CACHING ====================
    location ~ \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend_pool;
        proxy_cache_valid 200 30d;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ==================== DENY SENSITIVE PATHS ====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
